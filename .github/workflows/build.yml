name: Build SheepNote

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install pyinstaller

      - name: Get version
        id: version
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          else
            echo "VERSION=dev" >> $GITHUB_OUTPUT
          fi

      - name: Build EXE
        shell: bash
        run: |
          python -m PyInstaller --onefile --noconsole --icon=sheep.ico \
            --version-file=version_info.txt \
            --name="SheepNote-${{ steps.version.outputs.VERSION }}-Windows" \
            sticky_note.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: SheepNote-Windows
          path: dist/SheepNote-${{ steps.version.outputs.VERSION }}-Windows.exe

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install pyinstaller pystray pillow

      - name: Get version
        id: version
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          else
            echo "VERSION=dev" >> $GITHUB_OUTPUT
          fi

      - name: Build app bundle
        run: |
          python -m PyInstaller --onefile --windowed --icon=sheep.ico \
            --name="SheepNote-${{ steps.version.outputs.VERSION }}-macOS" \
            sticky_note.py

      - name: Zip app bundle
        run: |
          cd dist
          zip -r "SheepNote-${{ steps.version.outputs.VERSION }}-macOS.zip" \
            "SheepNote-${{ steps.version.outputs.VERSION }}-macOS.app"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: SheepNote-macOS
          path: dist/SheepNote-${{ steps.version.outputs.VERSION }}-macOS.zip

  release:
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: SheepNote-Windows

      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: SheepNote-macOS

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            SheepNote-*-Windows.exe
            SheepNote-*-macOS.zip
