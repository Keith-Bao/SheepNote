name: Build SheepNote

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install pyinstaller

      - name: Build EXE
        run: |
          python -m PyInstaller --onefile --noconsole --icon=sheep.ico `
            --version-file=version_info.txt --name=SheepNote sticky_note.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: SheepNote-Windows
          path: dist/SheepNote.exe

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install pyinstaller pystray pillow

      - name: Build app bundle
        run: |
          python -m PyInstaller --onefile --windowed --icon=sheep.ico \
            --name=SheepNote sticky_note.py

      - name: Zip app bundle
        run: |
          cd dist
          zip -r SheepNote-macOS.zip SheepNote.app

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: SheepNote-macOS
          path: dist/SheepNote-macOS.zip

  release:
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: SheepNote-Windows

      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: SheepNote-macOS

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            SheepNote.exe
            SheepNote-macOS.zip
